name: FGO Login Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: List files (debug)
        run: |
          pwd
          ls -la
          ls -la .github/ 2>/dev/null || echo "No .github folder"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r https://raw.githubusercontent.com/O-Isaac/FGO-Daily-Login/master/requirements.txt

      - name: Check if main.py exists
        run: |
          if [ -f "main.py" ]; then
            echo "main.py found"
            head -20 main.py
          else
            echo "ERROR: main.py NOT found!"
            echo "Files in current directory:"
            ls -la
          fi

      - name: Run main script
        run: python3 main.py
        env:
          userIds: ${{ secrets.GAME_USERIDS }}
          authKeys: ${{ secrets.GAME_AUTHKEYS }}
          secretKeys: ${{ secrets.GAME_SECRETKEYS }}
          UserAgent: ${{ secrets.GAME_USERAGENT }}
          fateRegion: ${{ secrets.GAME_REGION }}
          webhookDiscord: ${{ secrets.DISCORD_WEBHOOK }}
